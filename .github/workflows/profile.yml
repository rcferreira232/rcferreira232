name: GitHub Profile Summary Cards

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROFILE_SUMMARY_CARDS }}
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_SUMMARY_CARDS }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: -3
          AUTO_PUSH: false
      - name: Push to summary branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          cp -r profile-summary-card-output /tmp/profile-summary-card-output
          git checkout -f summary
          cp -r /tmp/profile-summary-card-output ./profile-summary-card-output
          git add profile-summary-card-output/
          git diff --cached --quiet || git commit -m "update profile summary cards"
          git push origin summary
